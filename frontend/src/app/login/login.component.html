<div class="container mt-5">

  <div class="card p-4 w-50 mx-auto">

    <h3 class="text-center">Login</h3>

    <input class="form-control mb-2"
           placeholder="Username"
           [(ngModel)]="username">

    <input class="form-control mb-2"
           type="password"
           placeholder="Password"
           [(ngModel)]="password">

    <button class="btn btn-primary w-100" (click)="login()">
      Login
    </button>

  </div>

</div>
